# ─── SonarQube sur Kubernetes (alternative au docker-compose) ─────────────────
# kubectl apply -f sonar-k8s.yaml -n learnify
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: pvc-sonar-db
  namespace: learnify
spec:
  accessModes: [ReadWriteOnce]
  resources:
    requests:
      storage: 5Gi
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: pvc-sonar-data
  namespace: learnify
spec:
  accessModes: [ReadWriteOnce]
  resources:
    requests:
      storage: 5Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: sonarqube-db
  namespace: learnify
  labels:
    app: sonarqube-db
spec:
  replicas: 1
  selector:
    matchLabels:
      app: sonarqube-db
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        app: sonarqube-db
    spec:
      containers:
        - name: postgres
          image: postgres:15-alpine
          env:
            - name: POSTGRES_DB
              value: sonarqube
            - name: POSTGRES_USER
              value: sonar
            - name: POSTGRES_PASSWORD
              value: sonar
          ports:
            - containerPort: 5432
          volumeMounts:
            - name: data
              mountPath: /var/lib/postgresql/data
          resources:
            requests:
              memory: "256Mi"
              cpu: "200m"
            limits:
              memory: "512Mi"
              cpu: "400m"
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: pvc-sonar-db
---
apiVersion: v1
kind: Service
metadata:
  name: sonarqube-db
  namespace: learnify
spec:
  selector:
    app: sonarqube-db
  ports:
    - port: 5432
      targetPort: 5432
  clusterIP: None
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: sonarqube
  namespace: learnify
  labels:
    app: sonarqube
spec:
  replicas: 1
  selector:
    matchLabels:
      app: sonarqube
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        app: sonarqube
    spec:
      initContainers:
        - name: sysctl
          image: busybox
          command: ["sysctl", "-w", "vm.max_map_count=524288"]
          securityContext:
            privileged: true
      containers:
        - name: sonarqube
          image: sonarqube:10.4-community
          env:
            - name: SONAR_JDBC_URL
              value: "jdbc:postgresql://sonarqube-db:5432/sonarqube"
            - name: SONAR_JDBC_USERNAME
              value: sonar
            - name: SONAR_JDBC_PASSWORD
              value: sonar
          ports:
            - containerPort: 9000
          volumeMounts:
            - name: data
              mountPath: /opt/sonarqube/data
          resources:
            requests:
              memory: "1Gi"
              cpu: "500m"
            limits:
              memory: "2Gi"
              cpu: "1000m"
          readinessProbe:
            httpGet:
              path: /api/system/status
              port: 9000
            initialDelaySeconds: 60
            periodSeconds: 15
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: pvc-sonar-data
---
apiVersion: v1
kind: Service
metadata:
  name: sonarqube
  namespace: learnify
spec:
  selector:
    app: sonarqube
  type: NodePort
  ports:
    - port: 9000
      targetPort: 9000
      nodePort: 30900
