# Fichier de configuration SonarQube pour le frontend Angular
# À placer dans frontend/ et utiliser avec : sonar-scanner
sonar.projectKey=learnify-frontend
sonar.projectName=Learnify - Frontend
sonar.projectVersion=1.0

sonar.sources=src
sonar.exclusions=**/node_modules/**,**/*.spec.ts,**/dist/**,**/coverage/**

# Rapport de couverture (généré par ng test --code-coverage)
sonar.javascript.lcov.reportPaths=coverage/lcov.info

sonar.typescript.tsconfigPath=tsconfig.json
sonar.sourceEncoding=UTF-8
