apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: pvc-mysql-payment-db
  namespace: learnify
spec:
  accessModes: [ReadWriteOnce]
  resources:
    requests:
      storage: 2Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: mysql-payment-db
  namespace: learnify
  labels:
    app: mysql-payment-db
spec:
  replicas: 1
  selector:
    matchLabels:
      app: mysql-payment-db
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        app: mysql-payment-db
    spec:
      containers:
        - name: mysql
          image: mysql:8.0
          ports:
            - containerPort: 3306
          env:
            - name: MYSQL_ROOT_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: learnify-secrets
                  key: MYSQL_ROOT_PASSWORD
            - name: MYSQL_DATABASE
              value: payment_db
          volumeMounts:
            - name: data
              mountPath: /var/lib/mysql
          resources:
            requests:
              memory: "256Mi"
              cpu: "250m"
            limits:
              memory: "512Mi"
              cpu: "500m"
          livenessProbe:
            exec:
              command: ["mysqladmin", "ping", "-h", "localhost"]
            initialDelaySeconds: 30
            periodSeconds: 10
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: pvc-mysql-payment-db
---
apiVersion: v1
kind: Service
metadata:
  name: mysql-payment-db
  namespace: learnify
spec:
  selector:
    app: mysql-payment-db
  ports:
    - port: 3306
      targetPort: 3306
  clusterIP: None
