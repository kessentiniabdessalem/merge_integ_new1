# kubectl apply -k devops/k8s/  (depuis la racine du projet)
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: learnify

resources:
  # 1. Namespace (pas de namespace ici - il crée le sien)
  - namespace.yaml

  # 2. Config
  - secrets.yaml
  - configmap.yaml

  # 3. Bases de données MySQL
  - mysql/mysql-user-db.yaml
  - mysql/mysql-ai-db.yaml
  - mysql/mysql-event-db.yaml
  - mysql/mysql-payment-db.yaml
  - mysql/mysql-certificate-db.yaml
  - mysql/mysql-quiz-db.yaml
  - mysql/mysql-course-db.yaml
  - mysql/mysql-job-db.yaml
  - mysql/mysql-preevaluation-db.yaml

  # 4. Infrastructure
  - eureka/eureka.yaml
  - api-gateway/api-gateway.yaml

  # 5. Microservices backend
  - services/user-service.yaml
  - services/ai-service.yaml
  - services/preevaluation-service.yaml
  - services/event-service.yaml
  - services/payment-service.yaml
  - services/certificate-service.yaml
  - services/quiz-feedback-service.yaml
  - services/course-service.yaml
  - services/job-service.yaml

  # 6. Frontend
  - frontend/frontend.yaml

  # 7. Ingress
  - ingress/ingress.yaml

  # 8. Monitoring
  - monitoring/prometheus-configmap.yaml
  - monitoring/prometheus-deployment.yaml
  - monitoring/grafana-deployment.yaml
