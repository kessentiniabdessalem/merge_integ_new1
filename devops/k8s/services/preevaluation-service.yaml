apiVersion: apps/v1
kind: Deployment
metadata:
  name: preevaluation-service
  namespace: learnify
  labels:
    app: preevaluation-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: preevaluation-service
  template:
    metadata:
      labels:
        app: preevaluation-service
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/path: "/actuator/prometheus"
        prometheus.io/port: "8089"
    spec:
      containers:
        - name: preevaluation-service
          image: docker.io/abdessalem1222/learnify-preevaluation-service:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8089
          env:
            - name: SPRING_DATASOURCE_URL
              valueFrom:
                configMapKeyRef:
                  name: learnify-config
                  key: DB_PREEVALUATION_URL
            - name: SPRING_DATASOURCE_USERNAME
              value: root
            - name: SPRING_DATASOURCE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: learnify-secrets
                  key: MYSQL_ROOT_PASSWORD
            - name: EUREKA_CLIENT_SERVICEURL_DEFAULTZONE
              valueFrom:
                configMapKeyRef:
                  name: learnify-config
                  key: EUREKA_SERVER_URL
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: learnify-secrets
                  key: JWT_SECRET
            - name: GROQ_API_KEY
              valueFrom:
                secretKeyRef:
                  name: learnify-secrets
                  key: GROQ_API_KEY
            - name: PREEVALUATION_AI_PROVIDER
              value: groq
            - name: MANAGEMENT_ENDPOINTS_WEB_EXPOSURE_INCLUDE
              value: "health,info,prometheus,metrics"
          resources:
            requests:
              memory: "256Mi"
              cpu: "200m"
            limits:
              memory: "512Mi"
              cpu: "400m"
          readinessProbe:
            httpGet:
              path: /actuator/health
              port: 8089
            initialDelaySeconds: 45
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /actuator/health
              port: 8089
            initialDelaySeconds: 90
            periodSeconds: 15
---
apiVersion: v1
kind: Service
metadata:
  name: preevaluation-service
  namespace: learnify
spec:
  selector:
    app: preevaluation-service
  ports:
    - port: 8089
      targetPort: 8089
