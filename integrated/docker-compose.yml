services:

  # ─────────────────────────────────────────────
  # DATABASES (one per service)
  # ─────────────────────────────────────────────

  event-mysql:
    image: mysql:8.0
    container_name: event-mysql
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: event_db
    ports:
      - "3306:3306"
    volumes:
      - event_mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  payment-mysql:
    image: mysql:8.0
    container_name: payment-mysql
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: payment_db
    ports:
      - "3307:3306"
    volumes:
      - payment_mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  certificate-mysql:
    image: mysql:8.0
    container_name: certificate-mysql
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: certificate_db
    ports:
      - "3308:3306"
    volumes:
      - certificate_mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  quiz-mysql:
    image: mysql:8.0
    container_name: quiz-mysql
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: quiz_db
    ports:
      - "3309:3306"
    volumes:
      - quiz_mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  ai-mysql:
    image: mysql:8.0
    container_name: ai-mysql
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: ai_db
    ports:
      - "3310:3306"
    volumes:
      - ai_mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  course-mysql:
    image: mysql:8.0
    container_name: course-mysql
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: course_db
    ports:
      - "3311:3306"
    volumes:
      - course_mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  user-mysql:
    image: mysql:8.0
    container_name: user-mysql
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: user_db
    ports:
      - "3312:3306"
    volumes:
      - user_mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  job-mysql:
    image: mysql:8.0
    container_name: job-mysql
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: job_db
    ports:
      - "3313:3306"
    volumes:
      - job_mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─────────────────────────────────────────────
  # EUREKA SERVICE REGISTRY
  # ─────────────────────────────────────────────

  eureka-server:
    build:
      context: ./eureka-server
      dockerfile: Dockerfile
    container_name: eureka-server
    ports:
      - "8761:8761"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8761/actuator/health"]
      interval: 15s
      timeout: 5s
      retries: 5

  # ─────────────────────────────────────────────
  # MICROSERVICES
  # ─────────────────────────────────────────────

  event-service:
    build:
      context: ./event-service
      dockerfile: Dockerfile
    container_name: event-service
    ports:
      - "8081:8081"
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://event-mysql:3306/event_db?createDatabaseIfNotExist=true&useUnicode=true&characterEncoding=utf8
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: root
      SERVER_PORT: 8081
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://eureka-server:8761/eureka/
    depends_on:
      event-mysql:
        condition: service_healthy
      eureka-server:
        condition: service_healthy

  payment-service:
    build:
      context: ./payment-service
      dockerfile: Dockerfile
    container_name: payment-service
    ports:
      - "8082:8082"
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://payment-mysql:3306/payment_db?createDatabaseIfNotExist=true&useUnicode=true&characterEncoding=utf8
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: root
      SERVER_PORT: 8082
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://eureka-server:8761/eureka/
      EMAIL_USERNAME: ${EMAIL_USERNAME:-tahersahbi7@gmail.com}
      EMAIL_PASSWORD: ${EMAIL_PASSWORD:-ofswwnnicgclvatr}
    depends_on:
      payment-mysql:
        condition: service_healthy
      eureka-server:
        condition: service_healthy

  certificate-service:
    build:
      context: ./certificate-service
      dockerfile: Dockerfile
    container_name: certificate-service
    ports:
      - "8083:8083"
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://certificate-mysql:3306/certificate_db?createDatabaseIfNotExist=true&useUnicode=true&characterEncoding=utf8
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: root
      SERVER_PORT: 8083
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://eureka-server:8761/eureka/
    depends_on:
      certificate-mysql:
        condition: service_healthy
      eureka-server:
        condition: service_healthy

  quiz-feedback-service:
    build:
      context: ./quiz-feedback-service
      dockerfile: Dockerfile
    container_name: quiz-feedback-service
    ports:
      - "8084:8084"
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://quiz-mysql:3306/quiz_db?createDatabaseIfNotExist=true&useUnicode=true&characterEncoding=utf8
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: root
      SERVER_PORT: 8084
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://eureka-server:8761/eureka/
    depends_on:
      quiz-mysql:
        condition: service_healthy
      eureka-server:
        condition: service_healthy

  ai-service:
    build:
      context: ./ai-service
      dockerfile: Dockerfile
    container_name: ai-service
    ports:
      - "8085:8085"
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://ai-mysql:3306/ai_db?createDatabaseIfNotExist=true&useUnicode=true&characterEncoding=utf8
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: root
      SERVER_PORT: 8085
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://eureka-server:8761/eureka/
      GEMINI_API_KEY: AIzaSyDRjSoMWQKu7htQMlG9TWTjOEU8Nc_EvGA
    depends_on:
      ai-mysql:
        condition: service_healthy
      eureka-server:
        condition: service_healthy

  course-service:
    build:
      context: ./course-service
      dockerfile: Dockerfile
    container_name: course-service
    ports:
      - "8086:8086"
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://course-mysql:3306/course_db?createDatabaseIfNotExist=true&useUnicode=true&characterEncoding=utf8
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: root
      SERVER_PORT: 8086
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://eureka-server:8761/eureka/
    depends_on:
      course-mysql:
        condition: service_healthy
      eureka-server:
        condition: service_healthy

  user-service:
    build:
      context: ./user-service
      dockerfile: Dockerfile
    container_name: user-service
    ports:
      - "8087:8087"
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://user-mysql:3306/user_db?createDatabaseIfNotExist=true&useUnicode=true&characterEncoding=utf8
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: root
      SERVER_PORT: 8087
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://eureka-server:8761/eureka/
      # Même principe qu’ang : définir SENDGRID_API_KEY dans .env ou l’environnement hôte.
      SENDGRID_API_KEY: ${SENDGRID_API_KEY}
      # Définir dans un fichier .env à la racine de integrated/ (ne pas versionner) — voir .env.example
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET}
      WEBAUTHN_RP_ID: localhost
      WEBAUTHN_ORIGIN: http://localhost:4200
    depends_on:
      user-mysql:
        condition: service_healthy
      eureka-server:
        condition: service_healthy

  job-service:
    build:
      context: ./job-service
      dockerfile: Dockerfile
    container_name: job-service
    ports:
      - "8088:8088"
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://job-mysql:3306/job_db?createDatabaseIfNotExist=true&useUnicode=true&characterEncoding=utf8
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: root
      SERVER_PORT: 8088
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://eureka-server:8761/eureka/
    depends_on:
      job-mysql:
        condition: service_healthy
      eureka-server:
        condition: service_healthy

  # ─────────────────────────────────────────────
  # API GATEWAY
  # ─────────────────────────────────────────────

  api-gateway:
    build:
      context: ./api-gateway
      dockerfile: Dockerfile
    container_name: api-gateway
    ports:
      - "8080:8080"
    environment:
      SERVER_PORT: 8080
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://eureka-server:8761/eureka/
    depends_on:
      eureka-server:
        condition: service_healthy
      event-service:
        condition: service_started
      payment-service:
        condition: service_started
      certificate-service:
        condition: service_started
      quiz-feedback-service:
        condition: service_started
      ai-service:
        condition: service_started
      course-service:
        condition: service_started
      user-service:
        condition: service_started
      job-service:
        condition: service_started

# ─────────────────────────────────────────────
# VOLUMES
# ─────────────────────────────────────────────

volumes:
  event_mysql_data:
  payment_mysql_data:
  certificate_mysql_data:
  quiz_mysql_data:
  ai_mysql_data:
  course_mysql_data:
  user_mysql_data:
  job_mysql_data:
