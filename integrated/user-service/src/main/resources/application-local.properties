# Profil « local » : développement sans Eureka (rien sur :8761).
# Démarrage : mvn spring-boot:run -Dspring-boot.run.profiles=local
# (sinon les erreurs Connection refused vers Eureka restent normales si le serveur Eureka n’est pas lancé.)

eureka.client.enabled=false
eureka.client.register-with-eureka=false
eureka.client.fetch-registry=false

# Base locale sans MySQL pour tests rapides (mémoire, propre à chaque démarrage)
spring.datasource.url=jdbc:h2:mem:user-service-db;MODE=MySQL;DATABASE_TO_LOWER=TRUE;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop

# À chaque démarrage : remet admin@learnify.com sur admin123 et déverrouille le compte (pratique en dev).
learnify.dev.reset-admin-password=true

# Sans confirmation device : login renvoie directement le JWT (comme l’ancien comportement intégré).
# Pour tester le flux e-mail comme en prod/ang : commenter la ligne ou passer -Dspring-boot.run.profiles= sans « local ».
app.skip-device-confirmation=true

# QR code : comme ang/UserAndPreevaluation — le téléphone doit joindre cette URL (pas localhost).
# Remplace par ton IP locale (ipconfig / ifconfig) ou export APP_FRONTEND_URL=http://192.168.x.x:4200
app.frontend-url=${APP_FRONTEND_URL:http://192.168.1.14:4200}

# SendGrid : définir SENDGRID_API_KEY pour envoyer les mails ; sinon le user-service démarre quand même (clé vide).

# PIN déblocage compte (3 mauvais mots de passe) : log serveur si SendGrid n’est pas configuré.
app.security.log-unblock-pin-in-dev=true

# Après « Continue with Google », le navigateur doit aller sur ton Angular (souvent localhost:4200 même si le QR utilise l’IP).
# Si tu ouvres l’app uniquement via nip.io, mets la même origin, ex. http://192.168.1.14.nip.io:4200
app.oauth2-redirect-base=${APP_OAUTH2_REDIRECT_BASE:http://localhost:4200}

# OAuth comme ang : callback sur le user-service (port 8087), pas sur :4200.
# Si tu testes depuis un téléphone sur l’IP LAN, ajoute dans Google la même URI avec ton IP, ex. :
# spring.security.oauth2.client.registration.google.redirect-uri=http://192.168.1.14:8087/login/oauth2/code/google
