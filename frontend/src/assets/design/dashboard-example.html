<!-- Learnify English — Dashboard Redesign Example -->
<div style="display:flex;gap:1.5rem;padding:1.5rem;align-items:flex-start;">
  <nav class="app-sidebar card" style="height:fit-content;">
    <ul class="sidebar-nav">
      <li><a class="active" href="#">Dashboard</a></li>
      <li><a href="#">Courses</a></li>
      <li><a href="#">Messenger</a></li>
      <li><a href="#">Clubs</a></li>
      <li><a href="#">Events</a></li>
      <li><a href="#">Payments</a></li>
      <li><a href="#">Jobs</a></li>
      <li><a href="#">Admin</a></li>
    </ul>
  </nav>

  <main style="flex:1;display:flex;flex-direction:column;gap:1rem;">
    <section style="display:flex;gap:1rem;flex-wrap:wrap;">
      <div class="stats-card" style="flex:1;min-width:200px;"><div>
        <div class="stats-value">1,248</div>
        <div style="color:var(--muted)">Active Students</div>
      </div></div>
      <div class="stats-card" style="flex:1;min-width:200px;"><div>
        <div class="stats-value">342</div>
        <div style="color:var(--muted)">Active Tutors</div>
      </div></div>
      <div class="stats-card" style="flex:1;min-width:200px;"><div>
        <div class="stats-value">96%</div>
        <div style="color:var(--muted)">Course Completion</div>
      </div></div>
    </section>

    <section class="card" style="padding:1rem;">
      <h3 style="margin:0 0 .75rem 0;color:var(--color-primary)">Calendar</h3>
      <div style="height:220px;background:linear-gradient(180deg, rgba(61,61,96,0.02), rgba(246,189,96,0.04));border-radius:8px;display:flex;align-items:center;justify-content:center;color:var(--muted)">[Calendar placeholder]</div>
    </section>

    <section style="display:flex;gap:1rem;">
      <div class="card" style="flex:1;padding:1rem;">
        <h4 style="margin-top:0;color:var(--color-primary)">Messages</h4>
        <div style="color:var(--muted)">Preview of recent conversations...</div>
      </div>
      <div class="card" style="width:320px;padding:1rem;">
        <h4 style="margin-top:0;color:var(--color-primary)">Notifications</h4>
        <div style="color:var(--muted)">Recent alerts, payments, and system messages.</div>
      </div>
    </section>
  </main>
</div>
