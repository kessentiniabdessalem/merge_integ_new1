<div class="signin-page">
  <div class="signin-container">
    <h2 class="signin-title text-center">Sign in with QR code</h2>

    <p class="text-muted small text-center mb-3">
      Optionally enter your email to help us pre-fill your account:
    </p>

    <div class="form-group">
      <label>Email address (optional)</label>
      <input
        type="email"
        class="form-control form-control-lg"
        [(ngModel)]="email"
        name="email"
        placeholder="Enter email (optional)"
      >
    </div>

    <button
      class="btn btn-login w-100"
      type="button"
      [disabled]="loading"
      (click)="getQrCode()">
      {{ loading ? 'Generating QR code...' : 'Get QR code' }}
    </button>

    <p *ngIf="errorMessage" class="alert alert-danger mt-3 mb-0">
      {{ errorMessage }}
    </p>

    <div *ngIf="qrUrl" class="mt-4 text-center">
      <p class="mb-3">Scan this QR code with your phone to continue.</p>

      <qrcode
        [qrdata]="qrUrl"
        [width]="250"
        [errorCorrectionLevel]="'M'">
      </qrcode>

      <p class="mt-3 text-muted small" *ngIf="expiresAt">
        This QR code will expire soon.
      </p>

      <p class="mt-2 small" *ngIf="statusText">
        {{ statusText }}
      </p>

      <button
        type="button"
        class="btn btn-qr w-100 mt-3"
        (click)="regenerate()">
        Regenerate QR code
      </button>
    </div>

    <div class="signup-link-wrap">
      <a [routerLink]="['/auth/login']">Back to normal sign-in</a>
    </div>
  </div>
</div>
