<div class="signin-page">
  <div class="signin-container">
    <h2 class="signin-title text-center">Approve sign-in</h2>

    <div *ngIf="!isApproved && !token && !hasError" class="text-danger text-center mb-2">
      Missing QR token. Please scan the QR code again.
    </div>

    <p *ngIf="!isApproved && token" class="text-center text-muted small">
      To approve the sign-in request, log in with your Learnify account on this phone.
    </p>

    <div *ngIf="isApproved" class="alert alert-success">
      Approved. You can go back to your PC.
    </div>

    <div *ngIf="hasError" class="alert alert-danger">
      {{ errorMsg || 'Something went wrong. Please try again.' }}
    </div>

    <form *ngIf="!isApproved && token"
          (ngSubmit)="approveWithPassword()"
          #f="ngForm"
          autocomplete="on">

      <div class="form-group">
        <label>Email</label>
        <input
          class="form-control form-control-lg"
          type="email"
          name="email"
          [(ngModel)]="email"
          required
          autocomplete="email"
          [disabled]="loading"
        />
      </div>

      <div class="form-group">
        <label>Password</label>
        <div class="d-flex gap-2 align-items-center">
          <input
            class="form-control form-control-lg"
            [type]="showPassword ? 'text' : 'password'"
            name="password"
            [(ngModel)]="password"
            required
            autocomplete="current-password"
            [disabled]="loading"
          />
          <button
            type="button"
            class="btn btn-passkey text-nowrap"
            (click)="showPassword = !showPassword"
            [disabled]="loading"
          >
            {{ showPassword ? 'Hide' : 'Show' }}
          </button>
        </div>
      </div>

      <button type="submit"
              class="btn btn-login w-100"
              [disabled]="loading || !f.valid">
        {{ loading ? 'Approving...' : 'Approve' }}
      </button>

      <button type="button"
              class="btn btn-link w-100 mt-2"
              (click)="backToLogin()"
              [disabled]="loading">
        Back to login
      </button>
    </form>
  </div>
</div>
