<div class="signin-page">
  <div class="signin-container">
    <h2 class="signin-title text-center">Forgot Password</h2>

    <div class="alert alert-success" *ngIf="message">{{ message }}</div>
    <div class="alert alert-danger" *ngIf="error">{{ error }}</div>

    <div class="form-group">
      <label>Email</label>
      <input type="email"
             class="form-control form-control-lg"
             [(ngModel)]="email"
             name="email"
             placeholder="Enter your email">
    </div>

    <div class="text-center">
      <button class="btn btn-login btn-lg px-5"
              type="button"
              (click)="sendPin()"
              [disabled]="loading">
        {{ loading ? 'Sending...' : 'Send PIN' }}
      </button>
    </div>

    <div class="forgot-wrap text-center">
      <a [routerLink]="['/auth/login']" [queryParams]="{ role: 'student' }">Back to login</a>
    </div>
  </div>
</div>
