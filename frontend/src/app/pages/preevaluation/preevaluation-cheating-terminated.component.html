<app-navbar></app-navbar>

<section class="py-5 bg-light min-vh-100">
  <div class="container">
    <div class="row justify-content-center">
      <div class="col-lg-7">
        <div class="card shadow border-0 rounded-4">
          <div class="card-body p-5 text-center">
            <div class="mb-3">
              <span class="badge bg-danger fs-6">Pre-evaluation closed</span>
            </div>
            <h1 class="h4 fw-bold mb-3">Access denied</h1>
            <p class="text-muted mb-4">{{ message }}</p>
            <p class="small text-muted mb-4">
              You cannot continue this assessment. If you believe this is a mistake, contact support.
            </p>
            <button type="button" class="btn btn-primary" (click)="signOut()">Sign out</button>
          </div>
        </div>
      </div>
    </div>
  </div>
</section>

<app-footer></app-footer>
