<section class="py-lg-13 py-8" id="pricing">
  <div class="container">
    <div class="row text-center">
      <div class="col-lg-6 mx-auto">
        <div class="mb-10">
          <span class="text-primary text-uppercase small fw-semibold" style="letter-spacing: .125rem;">Pricing</span>
          <h2 class="fw-bold mt-4 mb-4">Simple, Transparent <span class="text-primary">Pricing</span></h2>
          <p class="mb-0">
            Choose the plan that fits your goals. Upgrade or downgrade at any time.
          </p>
        </div>
      </div>
    </div>
    <div class="row g-4 justify-content-center">
      @for (plan of plans; track plan.name) {
        <div class="col-lg-4 col-md-6">
          <div class="card shadow-sm h-100 rounded-5 border-0 p-5" [ngClass]="{'border border-primary border-2': plan.highlighted}">
            <h5 class="fw-bold">{{ plan.name }}</h5>
            <div class="my-4">
              <span class="display-5 fw-bold">{{ plan.price }}</span>
              <span class="text-body-secondary">{{ plan.period }}</span>
            </div>
            <ul class="list-unstyled mb-4">
              @for (f of plan.features; track f) {
                <li class="d-flex align-items-center gap-2 mb-2">
                  <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" class="text-primary flex-shrink-0"><path d="M5 12l5 5L20 7"/></svg>
                  <span>{{ f }}</span>
                </li>
              }
            </ul>
            <button type="button" class="btn w-100" [ngClass]="plan.highlighted ? 'btn-primary' : 'btn-outline-primary'" (click)="onCta()">{{ plan.cta }}</button>
          </div>
        </div>
      }
    </div>
  </div>
</section>
