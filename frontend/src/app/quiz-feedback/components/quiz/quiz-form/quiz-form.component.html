<div class="container-fluid py-4">
  <div class="row justify-content-center">
    <div class="col-lg-8">
      <div class="card">
        <div class="card-header">
          <h3>{{ isEditMode ? 'Edit Quiz' : 'Create New Quiz' }}</h3>
        </div>
        <div class="card-body">
          <form [formGroup]="quizForm" (ngSubmit)="onSubmit()">
            <div class="mb-3">
              <label for="title" class="form-label">Title *</label>
              <input
                type="text"
                class="form-control"
                id="title"
                formControlName="title"
                [class.is-invalid]="quizForm.get('title')?.invalid && quizForm.get('title')?.touched"
              />
              <div class="invalid-feedback">Title is required</div>
            </div>

            <div class="mb-3">
              <label for="description" class="form-label">Description</label>
              <textarea
                class="form-control"
                id="description"
                rows="3"
                formControlName="description"
              ></textarea>
            </div>

            <div class="row">
              <div class="col-md-6 mb-3">
                <label for="courseId" class="form-label">Course ID *</label>
                <input
                  type="number"
                  class="form-control"
                  id="courseId"
                  formControlName="courseId"
                  [class.is-invalid]="quizForm.get('courseId')?.invalid && quizForm.get('courseId')?.touched"
                />
                <div class="invalid-feedback">Course ID is required</div>
              </div>

              <div class="col-md-6 mb-3">
                <label for="tutorId" class="form-label">Tutor ID</label>
                <input
                  type="number"
                  class="form-control"
                  id="tutorId"
                  formControlName="tutorId"
                />
              </div>
            </div>

            <div class="row">
              <div class="col-md-4 mb-3">
                <label for="timeLimitMinutes" class="form-label">Time Limit (minutes)</label>
                <input
                  type="number"
                  class="form-control"
                  id="timeLimitMinutes"
                  formControlName="timeLimitMinutes"
                />
              </div>

              <div class="col-md-4 mb-3">
                <label for="passingScore" class="form-label">Passing Score (%)</label>
                <input
                  type="number"
                  class="form-control"
                  id="passingScore"
                  formControlName="passingScore"
                  min="0"
                  max="100"
                />
              </div>

              <div class="col-md-4 mb-3">
                <label for="totalPoints" class="form-label">Total Points</label>
                <input
                  type="number"
                  class="form-control"
                  id="totalPoints"
                  formControlName="totalPoints"
                />
              </div>
            </div>

            <div class="mb-3">
              <label for="status" class="form-label">Status</label>
              <select class="form-select" id="status" formControlName="status">
                <option value="DRAFT">Draft</option>
                <option value="PUBLISHED">Published</option>
                <option value="ARCHIVED">Archived</option>
              </select>
            </div>

            <div class="d-flex justify-content-end gap-2">
              <button type="button" class="btn btn-secondary" (click)="cancel()" [disabled]="loading">
                Cancel
              </button>
              <button type="submit" class="btn btn-primary" [disabled]="quizForm.invalid || loading">
                <span *ngIf="loading" class="spinner-border spinner-border-sm me-2"></span>
                {{ isEditMode ? 'Update' : 'Create' }} Quiz
              </button>
            </div>
          </form>
        </div>
      </div>
    </div>
  </div>
</div>
